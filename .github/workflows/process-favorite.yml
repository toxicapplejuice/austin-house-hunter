name: Process Favorite

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    # Only run if issue title starts with "FAVORITE:"
    if: startsWith(github.event.issue.title, 'FAVORITE:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract ZPID and update favorites
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Extract zpid from issue title (format: "FAVORITE: 12345678")
          ZPID=$(echo "$ISSUE_TITLE" | sed 's/FAVORITE:[[:space:]]*//')
          echo "Processing favorite for ZPID: $ZPID"

          mkdir -p data

          python3 << 'PYEOF'
          import json
          import os
          from pathlib import Path

          zpid = os.environ["ISSUE_TITLE"].replace("FAVORITE:", "").strip()
          issue_body = os.environ.get("ISSUE_BODY", "")
          favorites_file = Path("data/favorites.json")

          # Load existing favorites
          if favorites_file.exists():
              with open(favorites_file) as f:
                  favorites = json.load(f)
          else:
              favorites = {}

          # Parse key=value pairs from issue body (embedded by email_sender.py)
          data = {}
          for line in issue_body.splitlines():
              if "=" in line:
                  key, _, value = line.partition("=")
                  key = key.strip()
                  value = value.strip()
                  if value:
                      data[key] = value

          def coerce(val, typ):
              try:
                  return typ(val)
              except (TypeError, ValueError):
                  return None

          entry = {
              "zpid": zpid,
              "address": data.get("address") or f"Property {zpid}",
              "name": data.get("address") or f"Property {zpid}",
              "price": coerce(data.get("price"), float),
              "beds": coerce(data.get("beds"), float),
              "baths": coerce(data.get("baths"), float),
              "sqft": coerce(data.get("sqft"), float),
              "neighborhood": data.get("neighborhood") or None,
              "latitude": coerce(data.get("latitude"), float),
              "longitude": coerce(data.get("longitude"), float),
              "has_hoa": data.get("has_hoa", "").lower() == "true",
              "hoa_fee": coerce(data.get("hoa_fee"), float),
              "zillow_url": data.get("zillow_url") or f"https://www.zillow.com/homedetails/{zpid}_zpid/",
          }

          if zpid not in favorites:
              favorites[zpid] = entry
              print(f"Added {zpid} to favorites: {entry.get('address')}")
          else:
              print(f"{zpid} already in favorites")

          with open(favorites_file, "w") as f:
              json.dump(favorites, f, indent=2)

          print(f"Total favorites: {len(favorites)}")
          PYEOF

      - name: Commit and push favorites
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/favorites.json
          git diff --staged --quiet || git commit -m "Add favorite: ${{ github.event.issue.title }}"
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Added to your favorites! You\'ll see this property in your next house hunting email.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
